name: Backend CI/CD

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend.yml'

  backend-quality-gate-run:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run full quality gate (test + coverage + format + duplication)
        working-directory: backend
        run: ./mvnw -B verify

      - name: Post coverage comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JACOCO_UNIT_XML: backend/target/site/jacoco/jacoco.xml
          JACOCO_IT_XML: backend/target/site/jacoco-it/jacoco.xml
          MIN_OVERALL: '50'
          MIN_CHANGED: '70'
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 .github/scripts/post-coverage-comment.py

      - name: Generate Spotless diff for annotations
        if: failure() && github.event_name == 'pull_request'
        working-directory: backend
        run: |
          ./mvnw -B spotless:apply 2>/dev/null || true
          git diff > spotless.diff

      - name: Setup reviewdog
        if: failure() && github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1

      - name: Annotate Spotless violations
        if: failure() && github.event_name == 'pull_request'
        working-directory: backend
        run: cat spotless.diff | reviewdog -f=diff -f.diff.strip=1 -name=spotless -reporter=github-pr-review -fail-on-error=false
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Annotate PMD CPD violations
        if: failure() && github.event_name == 'pull_request'
        working-directory: backend
        run: |
          if [ -f target/cpd.xml ]; then
            xmlstarlet sel -t -m '//duplication/file' \
              -v 'concat(@path, ":", @line, ":1: [warning] Duplicated block (", ../@lines, " lines, ", ../@tokens, " tokens)")' \
              -n target/cpd.xml > cpd.txt 2>/dev/null || true
            cat cpd.txt | reviewdog -efm='%f:%l:%c: [%t] %m' -name=pmd-cpd -reporter=github-pr-review -fail-on-error=false
          fi
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco*/

  backend-quality-gate:
    needs: [changes, backend-quality-gate-run]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: |
          result="${{ needs.backend-quality-gate-run.result }}"
          if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then exit 1; fi
          echo "Quality gate passed (backend-quality-gate-run: $result)"

  publish-image:
    needs: backend-quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/condo-vote-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/condo-vote-backend:latest
      - name: Trigger Coolify deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

  preview-deploy:
    needs: backend-quality-gate
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      needs.backend-quality-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push (tag pr-{number})
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/condo-vote-backend:pr-${{ github.event.pull_request.number }}
      - name: Trigger Coolify preview deploy
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}?pull_request_id=${{ github.event.pull_request.number }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}")
          echo "Coolify response: $HTTP"
          [[ "$HTTP" == "2"* ]] || exit 1
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const url = `https://${pr}.api.condovote.com.br`;
            const body = `### Backend preview deployado\n\n🔗 ${url}\n\n> Atualizado a cada push neste PR.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: pr
            });
            const existing = comments.find(c => c.body.includes('Backend preview deployado'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr, body
              });
            }

  preview-cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Stop Coolify preview
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X DELETE "${{ secrets.COOLIFY_API_URL }}/api/v1/applications/qygnlsghzris119vepaychk4/previews/${{ github.event.pull_request.number }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
