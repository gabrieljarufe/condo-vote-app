# CI backend — job `test` é placeholder até T5.1 (Fase 5) adicionar o job real.
# Após T5.1: substituir o step "Placeholder" por `cd backend && ./mvnw verify`.
# Não ativar status checks obrigatórios (T5.3) antes de T5.1 + T5.2 estarem verdes.
name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '*.java'
      - 'pom.xml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '*.java'
      - 'pom.xml'

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Placeholder
        run: echo "CI placeholder ativo. Jobs reais (backend/frontend/publish) serão adicionados na Fase 5 — ver docs/implementation/tasks/phase-5-cicd.md"
