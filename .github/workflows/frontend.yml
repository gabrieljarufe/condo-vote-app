name: Frontend CI/CD

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/frontend.yml'

  frontend-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (bloqueia em critical)
        working-directory: frontend
        run: npm audit --audit-level=critical

      - name: ESLint + reviewdog inline comments
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-eslint@v1
        with:
          reporter: github-pr-review
          workdir: ./frontend
          eslint_flags: 'src/ --max-warnings 0'
          fail_on_error: true
          level: warning

      - name: ESLint (push/dispatch — sem reviewdog)
        if: github.event_name != 'pull_request'
        working-directory: frontend
        run: npm run lint

      - name: Vitest + coverage
        working-directory: frontend
        run: npm run test:ci

      - name: Coverage sticky comment
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: ./frontend
          json-summary-path: ./frontend/coverage/coverage-summary.json

      - name: jscpd
        working-directory: frontend
        run: npm run cpd

      - name: jscpd annotations (em failure)
        if: failure() && github.event_name == 'pull_request'
        working-directory: frontend
        run: |
          npx jscpd src/ --reporters checkstyle --output ./jscpd-report 2>/dev/null || true
          if [ -f jscpd-report/jscpd-checkstyle.xml ]; then
            cat jscpd-report/jscpd-checkstyle.xml | reviewdog -f=checkstyle -name=jscpd -reporter=github-pr-review -fail-on-error=false
          fi
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  build-and-deploy:
    needs: [changes, frontend-test]
    if: >-
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
      (needs.frontend-test.result == 'success' || needs.frontend-test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        env:
          NG_APP_SUPABASE_URL: ${{ secrets.NG_APP_SUPABASE_URL }}
          NG_APP_SUPABASE_ANON_KEY: ${{ secrets.NG_APP_SUPABASE_ANON_KEY }}
          NG_APP_API_URL: ${{ secrets.NG_APP_API_URL }}
        run: npm run build:prod
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist/frontend/browser --project-name=condo-vote-frontend --branch=${{ github.ref_name }}
      - name: Publish URL to summary
        if: steps.deploy.outcome == 'success'
        run: |
          OUTPUT='${{ steps.deploy.outputs.command-output }}'
          UNIQUE_URL=$(echo "$OUTPUT" | grep -oE 'https://[a-z0-9]+\.condo-vote-frontend\.pages\.dev' | head -1 || echo "")
          BRANCH="${{ github.ref_name }}"

          if [ "$BRANCH" = "main" ]; then
            echo "### 🚀 Deploy de produção — \`main\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Produção:** https://app.condovote.com.br" >> $GITHUB_STEP_SUMMARY
            [ -n "$UNIQUE_URL" ] && echo "- **Unique URL:** $UNIQUE_URL" >> $GITHUB_STEP_SUMMARY
          else
            ALIAS_URL="https://${BRANCH}.condo-vote-frontend.pages.dev"
            echo "### 👀 Deploy de preview — \`${BRANCH}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Alias URL:** $ALIAS_URL" >> $GITHUB_STEP_SUMMARY
            [ -n "$UNIQUE_URL" ] && echo "- **Unique URL:** $UNIQUE_URL" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ℹ️ Alias URL pode levar alguns minutos pra propagar." >> $GITHUB_STEP_SUMMARY
          fi
