spring:
  application:
    name: condovote

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false

  mail:
    host: ${MAIL_HOST:127.0.0.1}
    port: ${MAIL_PORT:54325}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_URL}/auth/v1/.well-known/jwks.json
          jws-algorithms: ES256

supabase:
  # Defaults vazios para permitir boot sem essas envs (cenários onde nenhum endpoint
  # de Supabase Admin é exercitado). SupabaseAdminGatewayImpl valida no momento do uso.
  url: ${SUPABASE_URL:}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  actuator:
    username: ${ACTUATOR_USER}
    password: ${ACTUATOR_PASSWORD}
  cpf:
    encryption-key: ${CPF_ENCRYPTION_KEY}
  email:
    provider: ${EMAIL_PROVIDER:smtp}      # smtp (dev/test via Inbucket/GreenMail) | resend (prod)
    from: ${EMAIL_FROM:no-reply@condovote.local}
    accept-base-url: ${EMAIL_ACCEPT_BASE_URL:http://localhost:4200}
    resend:
      api-key: ${RESEND_API_KEY:}
      api-url: ${RESEND_API_URL:https://api.resend.com/emails}
  invitation:
    token-ttl-hours: ${INVITATION_TOKEN_TTL_HOURS:24}
  poll:
    opener-job:
      fixed-delay-ms: 300000   # 5 minutos
    closer-job:
      fixed-delay-ms: 300000   # 5 minutos
  onboarding:
    rate-limit:
      requests-per-minute: ${ONBOARDING_RATE_LIMIT_RPM:20}
  redis:
    url: ${REDIS_URL}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis
  info:
    build:
      enabled: true
    git:
      enabled: true

logging:
  structured:
    format:
      console: ecs
    json:
      add:
        service.name: condovote-backend
      customizer: com.condovote.shared.logging.SensitiveDataMaskingCustomizer

server:
  port: ${SERVER_PORT:8080}
  max-http-request-header-size: 16KB
