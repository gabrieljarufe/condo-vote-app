spring:
  application:
    name: condovote

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_URL}/auth/v1/.well-known/jwks.json
          jws-algorithms: ES256

supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  actuator:
    username: ${ACTUATOR_USER}
    password: ${ACTUATOR_PASSWORD}
  redis:
    url: ${REDIS_URL}
  cpf:
    encryption-key: ${CPF_ENCRYPTION_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis
  info:
    build:
      enabled: true
    git:
      enabled: true

logging:
  structured:
    format:
      console: ecs
    json:
      add:
        service.name: condovote-backend
      customizer: com.condovote.shared.logging.SensitiveDataMaskingCustomizer

server:
  port: ${SERVER_PORT:8080}
  max-http-request-header-size: 16KB
