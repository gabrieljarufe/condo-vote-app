services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: condo-vote-backend:local
    container_name: condo-vote-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      # Sobrescreve application-local.yaml: dentro do container, "localhost" aponta
      # pro próprio container; host.docker.internal alcança o host onde o Supabase CLI roda.
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:54322/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://host.docker.internal:54321/auth/v1/.well-known/jwks.json
      SUPABASE_URL: http://host.docker.internal:54321
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200
      APP_REDIS_URL: redis://redis:6379
      # E-mail via Resend (HTTP). Para voltar ao SMTP local (Inbucket/Mailpit),
      # trocar EMAIL_PROVIDER=smtp e descomentar MAIL_HOST/MAIL_PORT.
      APP_EMAIL_PROVIDER: resend
      APP_EMAIL_FROM: onboarding@resend.dev
      APP_EMAIL_ACCEPT_BASE_URL: http://localhost:4200
      APP_EMAIL_RESEND_API_KEY: ${RESEND_API_KEY:?defina RESEND_API_KEY no shell antes de subir o compose}
      APP_EMAIL_RESEND_API_URL: https://api.resend.com/emails
      # MAIL_HOST: host.docker.internal
      # MAIL_PORT: "54325"
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      # Necessário em Linux (Docker Engine puro); no macOS/Windows Docker Desktop
      # host.docker.internal já é resolvido nativamente. Declarar não prejudica.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: condo-vote-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
    restart: unless-stopped
