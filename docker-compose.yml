services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: condo-vote-backend:local
    container_name: condo-vote-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      # Sobrescreve application-local.yaml: dentro do container, "localhost" aponta
      # pro próprio container; host.docker.internal alcança o host onde o Supabase CLI roda.
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:54322/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://host.docker.internal:54321/auth/v1/.well-known/jwks.json
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200
    extra_hosts:
      # Necessário em Linux (Docker Engine puro); no macOS/Windows Docker Desktop
      # host.docker.internal já é resolvido nativamente. Declarar não prejudica.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped
